name: Daily satire articles

on:
  schedule:
    - cron: '23 13 * * *'
  workflow_dispatch:
    inputs:
      count:
        description: 'How many articles to generate'
        default: '2'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Generate articles
        run: node scripts/generate-articles.mjs --count ${{ github.event.inputs.count || '2' }}
      - name: Commit new articles
        run: |
          git config user.name "diss-patch-bot"
          git config user.email "actions@github.com"
          git add data public/articles public/sitemap.xml
          git diff --cached --quiet || git commit -m "Auto-publish daily satire articles"
          git push
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
